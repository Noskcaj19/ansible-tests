---
- name: Verify required CIFS secrets are defined
  ansible.builtin.assert:
    that:
      - lookup('vars', item) is defined
      - lookup('vars', item) | length > 0
    fail_msg: "Required secret '{{ item }}' is not defined or empty"
  loop:
    - base_server_cifs_username
    - base_server_cifs_password
    - base_server_cifs_domain
  when: base_server_cifs_share | length > 0
  tags:
    - base_server
    - base_server_cifs

- name: Install cifs-utils
  ansible.builtin.dnf:
    name: cifs-utils
    state: present

- name: Create CIFS credentials file
  ansible.builtin.template:
    src: cifs-credentials.j2
    dest: /etc/cifs-credentials
    owner: root
    group: root
    mode: "0600"

- name: Ensure CIFS mount point exists
  ansible.builtin.file:
    path: "{{ base_server_cifs_mount_point }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Mount CIFS share
  ansible.posix.mount:
    src: "{{ base_server_cifs_share }}"
    path: "{{ base_server_cifs_mount_point }}"
    fstype: cifs
    opts: "credentials=/etc/cifs-credentials,{{ base_server_cifs_options }}"
    state: mounted
