---
- name: Converge
  hosts: all
  become: true
  gather_facts: true

  roles:
    - role: jackson.vector
      vars:
        vector_config:
          data_dir: /var/lib/vector
          sources:
            journald:
              type: journald
            test_logs:
              type: file
              include:
                - /var/log/messages
          sinks:
            console:
              type: console
              inputs:
                - journald
                - test_logs
              encoding:
                codec: json
